plugins {
    id "java-library"
    id "application"
    id "de.craftsblock.gradle.publish" version "0.0.21"
    id("com.autonomousapps.dependency-analysis") version "3.8.0"
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17

    withJavadocJar()
    withSourcesJar()
}

application {
    mainClass = "de.craftsblock.craftsnet.CraftsNet"
}

group = "de.craftsblock"
version = "3.7.2-2"

repositories {
    mavenCentral()
    maven { url = "https://repo.craftsblock.de/releases" }
    maven { url = "https://repo.craftsblock.de/experimental" }
}

dependencies {
    // CraftsBlock related dependencies ---------------------------------------------------------------------------------------

    // https://repo.craftsblock.de/#/releases/de/craftsblock/craftscore/bom
    implementation platform("de.craftsblock.craftscore:bom:3.8.15")

    // https://repo.craftsblock.de/#/releases/de/craftsblock/craftscore/buffer
    api "de.craftsblock.craftscore:buffer"

    // https://repo.craftsblock.de/#/releases/de/craftsblock/craftscore/cache
    api "de.craftsblock.craftscore:cache"

    // https://repo.craftsblock.de/#/releases/de/craftsblock/craftscore/event
    api "de.craftsblock.craftscore:event"

    // https://repo.craftsblock.de/#/releases/de/craftsblock/craftscore/json
    api "de.craftsblock.craftscore:json"

    // https://repo.craftsblock.de/#/releases/de/craftsblock/craftscore/utils
    api "de.craftsblock.craftscore:utils"

    // Third party needed dependencies ----------------------------------------------------------------------------------------

    // https://mvnrepository.com/artifact/org.apache.tika/tika-core
    implementation "org.apache.tika:tika-core:3.3.0"

    // https://mvnrepository.com/artifact/org.jetbrains/annotations
    implementation "org.jetbrains:annotations:26.1.0"

    // Artifact resolving dependencies ----------------------------------------------------------------------------------------

    // https://mvnrepository.com/artifact/org.apache.maven.resolver/maven-resolver-api
    implementation "org.apache.maven.resolver:maven-resolver-api:2.0.16"

    // https://mvnrepository.com/artifact/org.apache.maven.resolver/maven-resolver-connector-basic
    implementation "org.apache.maven.resolver:maven-resolver-connector-basic:2.0.16"

    // https://mvnrepository.com/artifact/org.apache.maven.resolver/maven-resolver-impl
    implementation "org.apache.maven.resolver:maven-resolver-impl:2.0.16"

    // https://mvnrepository.com/artifact/org.apache.maven.resolver/maven-resolver-supplier-mvn4
    implementation "org.apache.maven.resolver:maven-resolver-supplier-mvn4:2.0.16"

    // https://mvnrepository.com/artifact/org.apache.maven.resolver/maven-resolver-transport-file
    implementation "org.apache.maven.resolver:maven-resolver-transport-file:2.0.16"

    // https://mvnrepository.com/artifact/org.apache.maven.resolver/maven-resolver-transport-http
    implementation "org.apache.maven.resolver:maven-resolver-transport-http:2.0.0-alpha-2"

    // https://mvnrepository.com/artifact/org.apache.maven.resolver/maven-resolver-util
    implementation "org.apache.maven.resolver:maven-resolver-util:2.0.16"

    // Testing ----------------------------------------------------------------------------------------------------------------

    // https://mvnrepository.com/artifact/org.junit/junit-bom
    testImplementation platform('org.junit:junit-bom:6.1.0-M1')

    // https://mvnrepository.com/artifact/org.junit.jupiter/junit-jupiter-api
    testImplementation 'org.junit.jupiter:junit-jupiter-api'

    // https://mvnrepository.com/artifact/org.junit.platform/junit-platform-launcher
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // https://mvnrepository.com/artifact/org.assertj/assertj-core
    testImplementation 'org.assertj:assertj-core:4.0.0-M1'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}

tasks.register("runnableJar", Jar) {
    archiveClassifier.set("runnable")

    manifest {
        attributes "Main-Class": application.mainClass.get()
    }

    from sourceSets.main.output

    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

craftsPublish {
    artifactId = "craftsnet"
    name = "CraftsNet"

    component = project.components.java

    pom {
        name = "CraftsNet"
        description = "Easy creation of HTTP routes and WebSocket endpoints in Java."

        scm {
            url = "https://github.com/CraftsBlock/CraftsNet"
            connection = "scm:git:git://github.com/CraftsBlock/CraftsNet.git"
            developerConnection = "scm:git:git@github.com:CraftsBlock/CraftsNet.git"
        }

        issueManagement {
            system = "github"
            url = "https://github.com/CraftsBlock/CraftsNet/issues"
        }

        licenses {
            license {
                name = "Apache License 2.0"
                url = "https://github.com/CraftsBlock/CraftsNet/blob/master/LICENSE"
            }
        }
    }

    extraArtifacts {

        runnable {
            task = "runnableJar"
            classifier = "runnable"
        }

    }
}
